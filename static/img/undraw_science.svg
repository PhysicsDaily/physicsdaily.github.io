<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Background Elements -->
  <defs>
    <linearGradient id="atomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Large Atom Structure - Center Left -->
  <g transform="translate(140, 180)">
    <!-- Electron Orbits -->
    <ellipse cx="0" cy="0" rx="90" ry="35" stroke="url(#orbitGrad)" stroke-width="2" fill="none" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="90" ry="35" stroke="url(#orbitGrad)" stroke-width="2" fill="none" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="90" ry="35" stroke="url(#orbitGrad)" stroke-width="2" fill="none" transform="rotate(90)"/>
    
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="20" fill="url(#atomGrad)"/>
    <circle cx="-6" cy="-4" r="8" fill="#818cf8" opacity="0.8"/>
    <circle cx="6" cy="4" r="8" fill="#a78bfa" opacity="0.8"/>
    <circle cx="0" cy="-8" r="6" fill="#c4b5fd" opacity="0.7"/>
    
    <!-- Electrons -->
    <circle cx="78" cy="-39" r="6" fill="#6366f1"/>
    <circle cx="-78" cy="39" r="6" fill="#6366f1"/>
    <circle cx="0" cy="-90" r="6" fill="#8b5cf6"/>
    <circle cx="45" cy="78" r="6" fill="#8b5cf6"/>
  </g>
  
  <!-- Person/Scientist Figure -->
  <g transform="translate(320, 120)">
    <!-- Head -->
    <circle cx="40" cy="30" r="28" fill="#fcd5ce"/>
    <!-- Hair -->
    <path d="M15 20 Q25 -5 55 5 Q75 10 70 30 Q65 25 60 28 Q50 10 30 15 Q20 18 15 20" fill="#5c4033"/>
    <!-- Body -->
    <path d="M10 65 L70 65 L75 160 L55 160 L50 100 L30 100 L25 160 L5 160 Z" fill="#6366f1"/>
    <!-- Arms -->
    <path d="M10 70 L-20 110 L-10 115 L15 85" fill="#6366f1"/>
    <path d="M70 70 L100 100 L95 110 L65 85" fill="#6366f1"/>
    <!-- Hands -->
    <circle cx="-15" cy="112" r="8" fill="#fcd5ce"/>
    <circle cx="97" cy="105" r="8" fill="#fcd5ce"/>
    <!-- Face details -->
    <circle cx="30" cy="28" r="3" fill="#333"/>
    <circle cx="50" cy="28" r="3" fill="#333"/>
    <path d="M35 42 Q40 48 45 42" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Glasses -->
    <rect x="22" y="22" width="16" height="12" rx="2" stroke="#333" stroke-width="1.5" fill="none"/>
    <rect x="42" y="22" width="16" height="12" rx="2" stroke="#333" stroke-width="1.5" fill="none"/>
    <line x1="38" y1="28" x2="42" y2="28" stroke="#333" stroke-width="1.5"/>
  </g>
  
  <!-- Small floating atoms -->
  <g transform="translate(400, 80)">
    <ellipse cx="0" cy="0" rx="25" ry="10" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.6" transform="rotate(-45)"/>
    <ellipse cx="0" cy="0" rx="25" ry="10" stroke="#8b5cf6" stroke-width="1.5" fill="none" opacity="0.6" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="6" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="18" cy="-18" r="3" fill="#6366f1"/>
  </g>
  
  <g transform="translate(80, 80)">
    <ellipse cx="0" cy="0" rx="20" ry="8" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.5" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="20" ry="8" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.5" transform="rotate(-30)"/>
    <circle cx="0" cy="0" r="5" fill="#6366f1" opacity="0.7"/>
    <circle cx="14" cy="12" r="2.5" fill="#8b5cf6"/>
  </g>
  
  <!-- Formula elements -->
  <g transform="translate(420, 280)" font-family="serif" font-style="italic">
    <text x="0" y="0" fill="#6366f1" font-size="18" opacity="0.7">E = mc²</text>
  </g>
  
  <g transform="translate(50, 320)" font-family="serif" font-style="italic">
    <text x="0" y="0" fill="#8b5cf6" font-size="16" opacity="0.6">F = ma</text>
  </g>
  
  <!-- Wave pattern -->
  <path d="M30 250 Q60 230 90 250 Q120 270 150 250 Q180 230 210 250" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Decorative dots/particles -->
  <circle cx="450" cy="180" r="4" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="470" cy="200" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="440" cy="220" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="30" cy="150" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="50" cy="180" r="2" fill="#8b5cf6" opacity="0.5"/>
</svg>